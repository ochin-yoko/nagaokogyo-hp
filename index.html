<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>長尾工業株式会社</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background-color: #0d0d0d;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 640px;
      width: 100%;
    }

    .logo-area {
      margin-bottom: 2.5rem;
    }

    .logo-area img {
      max-width: 280px;
      width: 100%;
      height: auto;
    }

    .divider {
      width: 50px;
      height: 2px;
      background-color: #555;
      margin: 2.5rem auto;
    }

    .message {
      font-size: 1.1rem;
      line-height: 2;
      color: #dddddd;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    .sub-message {
      font-size: 0.85rem;
      color: #888888;
      line-height: 2;
      letter-spacing: 0.05em;
    }

    .open-date {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      border: 1px solid #444;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: #aaaaaa;
    }

    .open-date span {
      display: block;
      font-size: 0.7rem;
      color: #666;
      margin-bottom: 0.3rem;
      letter-spacing: 0.15em;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.7rem;
      color: #444444;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <img src="./logo.png" alt="長尾工業株式会社">
    </div>

    <p class="message">只今、新しいウェブサイトを制作中です。</p>
    <p class="sub-message">
      より良いサービスをお届けするため、<br>
      ウェブサイトをリニューアルしております。<br>
      今しばらくお待ちください。
    </p>

    <div class="open-date">
      <span>OPEN</span>
      2026.05.01
    </div>
  </div>

  <footer>&copy; 長尾工業株式会社 All Rights Reserved.</footer>
</body>
</html>
